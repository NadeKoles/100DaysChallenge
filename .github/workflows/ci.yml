name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: xcodebuild -version

      - name: Run unit tests
        run: |
          set -o pipefail
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+' | head -1)
          echo "Testing on simulator: $DEVICE"
          xcodebuild test \
            -project 100DaysChallenge.xcodeproj \
            -scheme 100DaysChallenge \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO
